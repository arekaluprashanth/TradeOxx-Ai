version: '3.8'

services:
  frontend:
    build:
      context: .
      target: frontend-runner
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - backend

  backend:
    build:
      context: .
      target: backend-runner
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - ./packages/database/dev.db:/app/packages/database/dev.db
