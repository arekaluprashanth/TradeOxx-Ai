services:
  - type: web
    name: tradeoxx-backend
    env: node
    buildCommand: npm ci --include=dev && cd packages/database && npx prisma generate && cd ../../ && npm run build --workspace=apps/backend
    startCommand: npm run start:prod --workspace=apps/backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tradeoxx-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://tradeoxx-ai.vercel.app
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: tradeoxx-db
    databaseName: tradeoxx
    user: tradeoxx_user
