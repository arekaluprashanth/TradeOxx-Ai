version: '3.8'

services:
  server:
    image: tradeoxxai-server:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    container_name: tradeoxx-server
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - CLIENT_ORIGIN=*
    expose:
      - "3001"
    networks:
      - tradeoxx-net

  client:
    image: tradeoxxai-client:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.client
    container_name: tradeoxx-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - tradeoxx-net

networks:
  tradeoxx-net:
    driver: bridge
